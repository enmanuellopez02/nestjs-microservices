name: CI/CD per microservice

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Step 1: detect which apps changed (path filters)
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      users-service: ${{ steps.filter.outputs.users-service }}
      products-service: ${{ steps.filter.outputs.products-service }}
      orders-service: ${{ steps.filter.outputs.orders-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'apps/api-gateway/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            users-service:
              - 'apps/users-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            products-service:
              - 'apps/products-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            orders-service:
              - 'apps/orders-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'

  # Step 2: matrix build — one job per changed app
  build-and-deploy:
    needs: changes
    runs-on: ubuntu-latest
    if: |
      needs.changes.outputs.api-gateway == 'true' ||
      needs.changes.outputs.users-service == 'true' ||
      needs.changes.outputs.products-service == 'true' ||
      needs.changes.outputs.orders-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api-gateway
            changed: ${{ needs.changes.outputs.api-gateway }}
          - app: users-service
            changed: ${{ needs.changes.outputs.users-service }}
          - app: products-service
            changed: ${{ needs.changes.outputs.products-service }}
          - app: orders-service
            changed: ${{ needs.changes.outputs.orders-service }}
    steps:
      - name: Skip if app not changed
        if: matrix.changed != 'true'
        run: echo "::notice::${{ matrix.app }} sin cambios, skip"

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        if: matrix.changed == 'true'
        run: npm ci

      - name: Build (typecheck)
        if: matrix.changed == 'true'
        run: npx nest build ${{ matrix.app }}

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: matrix.changed == 'true' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            APP=${{ matrix.app }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest

      # Replace with your actual deploy step (kubectl set image, ArgoCD, Helm, etc.)
      - name: Deploy to k8s
        if: matrix.changed == 'true' && github.event_name == 'push'
        run: |
          echo "kubectl set image deployment/${{ matrix.app }} \
            ${{ matrix.app }}=ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}"
