name: CI/CD per microservice

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: 'Qué servicio buildear/deployar'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-gateway
          - users-service
          - products-service
          - orders-service

permissions:
  contents: read
  packages: write

jobs:
  # Step 1: decide what to build.
  # - manual run: respect the `app` input (single service or "all")
  # - push/PR: use path filters to detect which apps changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.decide.outputs.api-gateway }}
      users-service: ${{ steps.decide.outputs.users-service }}
      products-service: ${{ steps.decide.outputs.products-service }}
      orders-service: ${{ steps.decide.outputs.orders-service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            api-gateway:
              - 'apps/api-gateway/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            users-service:
              - 'apps/users-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            products-service:
              - 'apps/products-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'
            orders-service:
              - 'apps/orders-service/**'
              - 'libs/**'
              - 'package.json'
              - 'docker/Dockerfile'

      - name: Resolve which apps to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP="${{ inputs.app }}"
            for svc in api-gateway users-service products-service orders-service; do
              if [ "$APP" = "all" ] || [ "$APP" = "$svc" ]; then
                echo "$svc=true" >> "$GITHUB_OUTPUT"
              else
                echo "$svc=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "api-gateway=${{ steps.filter.outputs.api-gateway }}" >> "$GITHUB_OUTPUT"
            echo "users-service=${{ steps.filter.outputs.users-service }}" >> "$GITHUB_OUTPUT"
            echo "products-service=${{ steps.filter.outputs.products-service }}" >> "$GITHUB_OUTPUT"
            echo "orders-service=${{ steps.filter.outputs.orders-service }}" >> "$GITHUB_OUTPUT"
          fi

  # Step 2: matrix build — one job per changed app
  build-and-deploy:
    needs: changes
    runs-on: ubuntu-latest
    if: |
      needs.changes.outputs.api-gateway == 'true' ||
      needs.changes.outputs.users-service == 'true' ||
      needs.changes.outputs.products-service == 'true' ||
      needs.changes.outputs.orders-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api-gateway
            changed: ${{ needs.changes.outputs.api-gateway }}
          - app: users-service
            changed: ${{ needs.changes.outputs.users-service }}
          - app: products-service
            changed: ${{ needs.changes.outputs.products-service }}
          - app: orders-service
            changed: ${{ needs.changes.outputs.orders-service }}
    steps:
      - name: Skip if app not changed
        if: matrix.changed != 'true'
        run: echo "::notice::${{ matrix.app }} sin cambios, skip"

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        if: matrix.changed == 'true'
        run: npm ci

      - name: Build (typecheck)
        if: matrix.changed == 'true'
        run: npx nest build ${{ matrix.app }}

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: matrix.changed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name (GHCR requires it)
        if: matrix.changed == 'true'
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            APP=${{ matrix.app }}
          push: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:latest

      # Replace with your actual deploy step (kubectl set image, ArgoCD, Helm, etc.)
      - name: Deploy to k8s
        if: matrix.changed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "kubectl set image deployment/${{ matrix.app }} \
            ${{ matrix.app }}=ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}"
